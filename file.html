<script>
    const exportFile = (file, fileName = "export") => new Promise((resolve) => {
        const a = Object.assign(document.createElement("a"), {
            download: fileName,
            href: URL.createObjectURL(file),
            style: "display: none",
            onclick: (event) => {
                document.body.removeChild(event.target);
                event.stopPropagation();
                resolve();
            }
        });
        
        document.body.appendChild(a);
        a.click();
    });

    const importFile = () => new Promise((resolve) => {
        const file = Object.assign(document.createElement("input"), {
            type: "file",
            style: "display: none",
            oncancel: (event) => document.body.removeChild(event.target),
            onclick: (event) => event.stopPropagation(),
            onchange: (event) => {
                resolve(event.target.files[0]);
                document.body.removeChild(event.target);
            }
        });
        
        document.body.appendChild(file);        
        file.click();
    });

    const processHandle = (root, handle) => document.body.appendChild(Object.assign(document.createElement("div"), {
        style: `padding: 0.5em`,
        innerText: handle?.name ?? "add",

                    location.reload();
                }))));
            } else if (option === "t") {

    navigator.storage.getDirectory().then(root => {
        const file = new URLSearchParams(window.location.search).get("file");
        const values = root.values();

        if (!!file?.trim()) {
            root.getFileHandle(file, { create: true }).then(h => h.getFile().then(f => f.text().then(t => {
                document.write(t);
                window.onload?.();
            })));
        } else {            
            processHandle(root, null);
            processNext = () => values.next().then(result => {
                if (!result.done) {
                    processHandle(root, result.value);
                    processNext()
                }
            });
            processNext();
        }
    });
</script>
